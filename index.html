<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
	<link rel="stylesheet" href="app.css">
</head>
<body class="bg-custom font-custom">
    <div class="app bd-custom bg-dark border-0 shadow form-container">
		
        <h4 class="h5 mb-3 fw-normal text-center mb-3 fs-1">Calculadora</h4>
		<i class="bi bi-calculator fs-1"></i>

        <input type="number" id="valor1"
            class="form-control mb-2" placeholder="Primeiro valor">

        <input type="number" id="valor2"
            class="form-control mb-3" placeholder="Segundo valor">

        <div class="d-flex justify-content-between">
            <button class="btn btn-primary" onclick="calcular('+')">+</button>
            <button class="btn btn-primary" onclick="calcular('-')">-</button>
            <button class="btn btn-primary" onclick="calcular('*')">*</button>
            <button class="btn btn-primary" onclick="calcular('/')">/</button>
        </div>

        <h5 class="mt-3" id="resultado"></h5>

    </div>

    <script src="script.js"></script>
</body>
</html>
